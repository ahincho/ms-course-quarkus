name: CI/CD Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    uses: ahincho/nova-devops/.github/workflows/reusable-build-maven.yml@main
    secrets: inherit

  matrix:
    uses: ahincho/nova-devops/.github/workflows/reusable-build-matrix.yml@main
    with:
      build-tool: maven
      java-versions: '["25"]'
    secrets: inherit